<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Taumata — 插画师 · 偶尔写代码 / Illustrator · occasionally code">
  <meta name="color-scheme" content="light dark">
  <!-- 防缓存：避免直接访问根路径时显示旧页面 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Taumata</title>

  <!-- 模块化 CSS：按职责拆分，加载顺序固定 -->
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/picker.css">
  <link rel="stylesheet" href="assets/css/pages.css">

  <script>
    // FOUC 防闪脚本：DOM 渲染前应用主题、强调色与语言
    (function () {
      try {
        var KEY = 'taumata.theme.v1';
        var LANG_KEY = 'taumata.lang.v1';
        var DEFAULT_RGB = '255,107,53';
        var mode = 'dark';
        var rgb = DEFAULT_RGB;
        var stored = localStorage.getItem(KEY);
        if (stored) {
          var cfg = JSON.parse(stored);
          if (cfg.mode === 'light' || cfg.mode === 'dark') mode = cfg.mode;
          if (typeof cfg.accent_rgb === 'string' && /^\d{1,3},\d{1,3},\d{1,3}$/.test(cfg.accent_rgb)) rgb = cfg.accent_rgb;
        }
        var root = document.documentElement;
        root.setAttribute('data-theme', mode);
        var p = rgb.split(',');
        root.style.setProperty('--accent-r', p[0].trim());
        root.style.setProperty('--accent-g', p[1].trim());
        root.style.setProperty('--accent-b', p[2].trim());
        var lang = localStorage.getItem(LANG_KEY);
        if (lang !== 'zh' && lang !== 'en') lang = 'zh';
        root.setAttribute('lang', lang === 'zh' ? 'zh-CN' : 'en');
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body>

  <!-- 滚动进度条 -->
  <div class="scroll-progress" aria-hidden="true"></div>

  <!-- 顶部栏 -->
  <header class="topbar" role="banner">
    <div class="topbar-inner">
      <a href="#/" class="brand" aria-label="Taumata — 主页">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-text">TAUMATA</span>
      </a>
      <nav class="topbar-nav" aria-label="主导航">
        <a href="#/" class="nav-link" data-nav="home" data-i18n="nav.home">首页</a>
        <a href="#/work" class="nav-link" data-nav="work" data-i18n="nav.work">作品</a>
        <a href="#/notes" class="nav-link" data-nav="notes" data-i18n="nav.notes">笔记</a>
      </nav>
      <div class="topbar-actions">
        <div class="topbar-search">
          <svg class="search-icon" width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
            <circle cx="7" cy="7" r="5"/>
            <path d="M11 11l3 3"/>
          </svg>
          <input id="topSearch" class="topbar-search-input" type="search" placeholder="搜索作品 / 笔记…" data-i18n-placeholder="nav.search" aria-label="搜索作品和笔记" autocomplete="off">
        </div>
        <button id="langToggle" class="text-btn" type="button" aria-label="切换语言" title="Switch language (L)">EN</button>
        <button id="themeToggle" class="icon-btn" type="button" aria-label="切换明暗模式" title="切换明暗模式 (T)">
          <svg class="icon icon-sun" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" aria-hidden="true">
            <circle cx="8" cy="8" r="3"/>
            <path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.4 3.4l1.4 1.4M11.2 11.2l1.4 1.4M3.4 12.6l1.4-1.4M11.2 4.8l1.4-1.4"/>
          </svg>
          <svg class="icon icon-moon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" aria-hidden="true">
            <path d="M13 9.2A5.5 5.5 0 0 1 6.8 3 5.5 5.5 0 1 0 13 9.2z"/>
          </svg>
        </button>
        <button id="pickerOpen" class="icon-btn" type="button" aria-label="打开色板" title="色板 (,)">
          <svg class="icon" width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <circle cx="4" cy="8" r="2"/>
            <circle cx="8" cy="8" r="2" opacity="0.55"/>
            <circle cx="12" cy="8" r="2" opacity="0.25"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- 子页面挂载点（router 渲染） -->
  <div id="app"></div>

  <!-- 底部 -->
  <footer class="footer" role="contentinfo">
    <div class="footer-inner">
      <span class="footer-copy">© 2026 TAUMATA</span>
      <span class="footer-build" data-i18n="footer.build">2026.06 · v1.0</span>
      <button class="text-btn" data-backtop type="button" data-i18n="footer.backtop">回到顶部 ↑</button>
    </div>
  </footer>

  <!-- SAI/CSP 风格浮动色板 -->
  <div id="colorpicker" class="colorpicker" role="dialog" aria-modal="false" aria-label="色板" aria-hidden="true">
    <div class="picker-main">
      <div class="sv-square" id="svSquare" aria-label="饱和度与明度" role="slider" tabindex="0">
        <div class="sv-pointer" id="svPointer" aria-hidden="true"></div>
      </div>
      <div class="hue-bar" id="hueBar" aria-label="色相" role="slider" tabindex="0">
        <div class="hue-pointer" id="huePointer" aria-hidden="true"></div>
      </div>
    </div>
    <div class="picker-foot">
      <span class="picker-swatch" id="pickerSwatch" aria-hidden="true"></span>
      <input class="picker-hex" id="pickerHex" type="text" maxlength="7" spellcheck="false" autocomplete="off" aria-label="十六进制">
      <button class="picker-reset" id="pickerReset" type="button" data-i18n="picker.reset">重置</button>
    </div>
  </div>

  <!-- 复制提示 toast -->
  <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <!-- ES module 入口 -->
  <script type="module" src="assets/js/main.js"></script>
</body>
</html>
